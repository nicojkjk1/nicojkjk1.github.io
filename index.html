<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #1e1f22;
  overflow-x: hidden;
}

/* VIDEO FONDO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* OSCURECER FONDO */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  top: 0;
  left: 0;
  z-index: -1;
}

/* PARTICULAS */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #ff7ac6;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

/* FLORES */
.flower {
  position: fixed;
  top: -10vh;
  font-size: 18px;
  opacity: 0.8;
  animation: fall linear infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* CONTENEDOR */
.container {
  text-align: center;
  padding: 50px 20px;
  position: relative;
  z-index: 1;
}

/* BOTONES */
.btn {
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
  color: white;
  padding: 12px 25px;
  margin: 5px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
}

/* REDES */
.socials {
  text-align: center;
  margin-top: 60px;
}

.socials a {
  display: inline-block;
  margin: 5px 10px;
  padding: 10px 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop id="bg-video">
<source src="2.mp4" type="video/mp4">
</video>

<!-- 🌌 PARTICULAS -->
<script>
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

<!-- 🌸 FLORES -->
<script>
const flowers = ["🌸","🌷","💮","🌺"];

for (let i = 0; i < 20; i++) {
  let f = document.createElement("div");
  f.className = "flower";
  f.innerText = flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(f);
}
</script>
